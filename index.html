<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 코드 변환기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 250px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result-container { margin-top: 25px; }
        #result-text { font-weight: bold; color: #333; margin-bottom: 15px; font-size: 18px; }
        #qrcode { display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>QR 코드 생성기</h2>
    <p>문자열을 입력하면 변환 후 QR을 생성합니다.</p>
    <input type="text" id="userInput" value="1F-D10-3-103" placeholder="예: 1F-D10-3-103">
    <button onclick="generateQR()">변환 및 생성</button>

    <div id="result-container">
        <div id="result-text"></div>
        <div id="qrcode"></div>
    </div>
</div>

<script>
    function generateQR() {
        const input = document.getElementById('userInput').value;
        const resultTextDiv = document.getElementById('result-text');
        const qrcodeDiv = document.getElementById('qrcode');

        // 1. 문자열 변환 로직 (1F-D10-3-103 -> 1F0D1003102)
        // 규칙: 하이픈(-)으로 분리 후 각 요소를 패딩 처리하고 마지막 숫자는 -1
        const parts = input.split('-');
        
        if (parts.length < 4) {
            alert("형식이 올바르지 않습니다. (예: 1F-D10-3-103)");
            return;
        }

        const p1 = parts[0];                       // 1F
        const p2 = parts[1].padStart(4, '0');      // D10 -> 0D10
        const p3 = parts[2].padStart(2, '0');      // 3 -> 03
        const p4 = (parseInt(parts[3]) - 1).toString(); // 103 -> 102

        const convertedString = p1 + p2 + p3 + p4; // 1F0D1003102

        // 화면에 변환된 결과 텍스트 표시
        resultTextDiv.innerText = "변환 결과: " + convertedString;

        // 2. QR 코드 생성
        qrcodeDiv.innerHTML = ""; // 기존 QR 코드 초기화
        new QRCode(qrcodeDiv, {
            text: convertedString,
            width: 180,
            height: 180,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    // 페이지 로드 시 바로 실행되게 하려면 아래 주석 해제
    // window.onload = generateQR;
</script>

</body>
</html>
