<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 코드 변환기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .field { margin-bottom: 10px; text-align: left; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; }
        input { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
        button { margin-top: 8px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result-container { margin-top: 25px; }
        #result-text { font-weight: bold; color: #333; margin-bottom: 15px; font-size: 18px; }
        #qrcode { display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>QR 코드 생성기</h2>
    <p>세부 값을 입력하면 <strong>1F</strong>가 자동으로 붙어 변환됩니다.</p>

    <div class="field">
        <label for="part2Input">코드 (예: D10, B1)</label>
        <input type="text" id="part2Input" value="B1" placeholder="예: D10">
    </div>

    <div class="field">
        <label for="part3Input">두 번째 숫자</label>
        <input type="text" id="part3Input" value="23" placeholder="예: 3">
    </div>

    <div class="field">
        <label for="part4Input">세 번째 숫자</label>
        <input type="text" id="part4Input" value="3" placeholder="예: 103">
    </div>

    <button onclick="generateQR()">변환 및 생성</button>

    <div id="result-container">
        <div id="result-text"></div>
        <div id="qrcode"></div>
    </div>
</div>

<script>
    function formatCodePart(rawCode) {
        const cleaned = rawCode.trim().toUpperCase();
        const match = cleaned.match(/^([A-Z])(\d{1,2})$/);

        if (!match) {
            return null;
        }

        const letter = match[1];
        const number = match[2].padStart(2, '0');
        return `0${letter}${number}`;
    }

    function formatNumberPart(rawValue, length) {
        if (!/^\d+$/.test(rawValue.trim())) {
            return null;
        }

        return rawValue.trim().padStart(length, '0');
    }

    function generateQR() {
        const resultTextDiv = document.getElementById('result-text');
        const qrcodeDiv = document.getElementById('qrcode');

        const part1 = '1F';
        const part2 = formatCodePart(document.getElementById('part2Input').value);
        const part3 = formatNumberPart(document.getElementById('part3Input').value, 3);
        const part4 = formatNumberPart(document.getElementById('part4Input').value, 3);

        if (!part2 || !part3 || !part4) {
            alert('입력 형식이 올바르지 않습니다. (예: D10 / 3 / 103)');
            return;
        }

        const convertedString = `${part1}${part2}${part3}${part4}`;
        resultTextDiv.innerText = '변환 결과: ' + convertedString;

        qrcodeDiv.innerHTML = '';
        new QRCode(qrcodeDiv, {
            text: convertedString,
            width: 180,
            height: 180,
            colorDark : '#000000',
            colorLight : '#ffffff',
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    window.onload = generateQR;
</script>

</body>
</html>
