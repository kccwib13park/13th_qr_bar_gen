<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 코드 변환기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: min(92vw, 760px); }
        .section-label { font-size: 14px; color: #555; margin: 14px 0 6px; text-align: left; font-weight: 600; }
        .input-row { display: grid; gap: 12px; margin-bottom: 8px; }
        .zone-row { grid-template-columns: 1fr 1fr 1fr; }
        .rack-cell-labels,
        .rack-cell-row { grid-template-columns: 1fr 1fr; }
        .mini-label { text-align: left; font-size: 14px; color: #555; }
        input, select { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; background: #fff; }
        input:disabled, select:disabled { background: #e5e7eb; color: #555; border-color: #cbd5e1; opacity: 1; }
        #saveBtn { margin-top: 12px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #saveBtn:hover { background-color: #0056b3; }
        #result-container { margin-top: 25px; }
        #result-text { font-weight: bold; color: #333; margin-bottom: 15px; font-size: 18px; }
        #qrcode { display: inline-block; }
        #history-container { margin-top: 24px; text-align: left; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
        #history-container h3 { margin: 0; font-size: 16px; color: #333; }
        #history-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 8px; }
        #history-list li { margin: 0; }
        .history-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; }
        .history-item-btn { width: 100%; text-align: left; border: 1px solid #d9d9d9; border-radius: 8px; background: #fafafa; padding: 9px 10px; font-size: 14px; color: #333; cursor: pointer; word-break: break-all; margin-top: 0; }
        .history-item-btn:hover { background: #eef5ff; border-color: #9ec3ff; }
        .emoji-btn { border: 1px solid #d9d9d9; background: #fff; border-radius: 8px; padding: 6px 8px; cursor: pointer; font-size: 14px; line-height: 1; }
        .emoji-btn:hover { background: #f3f4f6; }

        @media (max-width: 620px) {
            .zone-row { grid-template-columns: 1fr; }
            .rack-cell-labels,
            .rack-cell-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR 코드 생성기</h2>
    <p>입력값을 넣으면 <strong>1F</strong>가 자동으로 붙어 변환됩니다.</p>

    <div class="section-label">존</div>
    <div class="input-row zone-row">
        <select id="zoneGroup" aria-label="존 분류"></select>
        <select id="zoneCode" aria-label="존 코드"></select>
        <select id="zoneNumber" aria-label="존 번호"></select>
    </div>

    <div class="input-row rack-cell-labels">
        <div class="mini-label">렉</div>
        <div class="mini-label">칸</div>
    </div>
    <div class="input-row rack-cell-row">
        <select id="rackInput" aria-label="렉 번호"></select>
        <select id="cellInput" aria-label="칸 번호"></select>
    </div>

    <button id="saveBtn" type="button">변환 및 저장</button>

    <div id="result-container">
        <div id="result-text"></div>
        <div id="qrcode"></div>
    </div>

    <div id="history-container">
        <div class="history-header">
            <h3>최근 생성 히스토리 (최대 20개)</h3>
            <button type="button" id="clearHistoryBtn" class="emoji-btn" title="전체 삭제">🗑️ 전체</button>
        </div>
        <ol id="history-list"></ol>
    </div>
</div>

<script>
    const zoneGroups = {
        TEMP_LOT: { label: '임시지번', codes: ['TEMP_LOT'] },
        A_ZONE: { label: 'A존', codes: ['AB', 'AC', 'AD', 'AR', 'AT', 'AZ', 'A'] },
        B_ZONE: { label: 'B존', codes: ['BA', 'BB', 'BC', 'BD'] },
        CD_ZONE: { label: 'C/D존', codes: ['C', 'D'] },
        MEZZANINE: { label: '메자닌', codes: ['E', 'F', 'G'] },
        H_ZONE: { label: 'H존', codes: ['H'] }
    };

    const zoneRules = {
        TEMP_LOT: [1, 1],
        A: [1, 1], AB: [1, 5], AC: [1, 5], AD: [1, 6], AR: [1, 2], AT: [1, 1], AZ: [1, 1],
        BA: [1, 2], BB: [1, 2], BC: [1, 2], BD: [1, 2],
        C: [1, 9], D: [1, 11],
        E: [0, 1], F: [1, 20], G: [1, 20],
        H: [1, 1]
    };

    const groupDefaults = {
        TEMP_LOT: { code: 'TEMP_LOT', number: 1, rack: 23, cell: 3 },
        A_ZONE: { code: 'AB', number: 5, rack: 1, cell: 101 },
        B_ZONE: { code: 'BA', number: 1, rack: 1, cell: 3 },
        CD_ZONE: { code: 'D', number: 8, rack: 1, cell: 101 },
        MEZZANINE: { code: 'E', number: 0, rack: 1, cell: 101 },
        H_ZONE: { code: 'H', number: 1, rack: 1, cell: 1 }
    };
    const DEFAULT_RACK_RANGE = [0, 50];
    const DEFAULT_CELL_OPTIONS = [1, 2, 3, 4, 101, 102, 103, 104, 201, 202, 203, 204, 301, 302, 303, 304, 401, 402, 403, 404];
    const locationInputRules = {
        // zoneRuleKey = `${zoneCode}-${zoneNumber}` 형태. 존별 확장 가능.
        'AC-2': { rackRange: [1, 30], cellOptions: [1], lockCell: true },
        'AD-2': { rackRange: [1, 10], cellOptions: [1], lockCell: true }
    };
    const AC2_RACK_PRODUCTS = {
        1: '창녕 양파 1.5kg',
        2: '한통 양배추',
        3: '제주 흙당근',
        4: '포항초 시금치',
        5: '제각각 양파 1.5kg',
        6: '참타리 버섯',
        7: '감자 1kg',
        8: 'EMPTY',
        9: '스태비아 대추방울토마토',
        10: '양파 1.5kg',
        11: '와일드 루꼴라 100g',
        12: 'M) 진도대파 700g',
        13: '성주꼬마참외 900g',
        14: '다다기오이 3입',
        15: '새송이버섯 400g',
        16: '고속&아삭 유러피안채소팩 300g',
        17: 'M) 한통양배추 900g',
        18: 'M) 당도선별 천혜양 1kg',
        19: '영암 꿀고구마 1kg',
        20: '국산블루베리 200g',
        21: '제각각 새송이버섯 300g + 300g',
        22: '채소믹스 500g',
        23: 'EMPTY',
        24: 'EMPTY',
        25: '채소믹스 1kg',
        26: 'M) 깐대파 500g',
        27: '감자 2kg',
        28: '싱그러운 유러피안 샐러드믹스 200g',
        29: '13brix 못생맛있사과 1.3kg',
        30: '파프리카 2입'
    };
    const AD2_RACK_PRODUCTS = {
        1: '14brix 못생맛있사과 1.5kg',
        2: '클래식 우유 식빵',
        3: '제주산 양배추 1통 (900g)',
        4: '로얄저지 우유 식빵',
        5: '양념 소불고기 1kg',
        6: '대저짭짤이토마토 600g',
        7: '알배기배추',
        8: '춘천식 닭갈비 1kg',
        9: '장수콩나물 600g',
        10: '스위티오 바나나 1kg'
    };

    const HISTORY_KEY = 'qr_generator_history_v2';
    const HISTORY_LIMIT = 20;
    const WEEKDAYS = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

    function pad2(n) { return String(n).padStart(2, '0'); }

    function getNumberOptionLabel(zoneCode, value) {
        if (zoneCode === 'AB' && value === 5) return '5 (보충 지번)';
        if (zoneCode === 'AC' && value === 2) return '2 (벌크/원빠존)';
        if (zoneCode === 'AD' && value === 2) return '2 (벌크존)';
        if (zoneCode === 'D' && value === 8) return '8 (육류 전용 보충 지번)';
        if (zoneCode === 'D' && value === 9) return '9 (소량 보충 지번)';
        if (zoneCode === 'D' && value === 10) return '10 (소량 보충 지번)';
        if (zoneCode === 'D' && value === 11) return '11 (소량 보충 지번)';
        if (zoneCode === 'E' && value === 0) return '0 (벌크 보충 지번)';
        if (zoneCode === 'E' && value === 1) return '1 (소량 보충 지번)';
        return String(value);
    }

    function initializeZoneInputs() {
        const zoneGroupSelect = document.getElementById('zoneGroup');
        zoneGroupSelect.innerHTML = '';

        Object.entries(zoneGroups).forEach(([groupKey, group]) => {
            const option = document.createElement('option');
            option.value = groupKey;
            option.textContent = group.label;
            zoneGroupSelect.appendChild(option);
        });

        zoneGroupSelect.value = 'TEMP_LOT';
        updateZoneCodeOptions();
        applyDefaultsByGroup(true);
    }

    function createRange(start, end) {
        const list = [];
        for (let value = start; value <= end; value += 1) list.push(value);
        return list;
    }

    function getRackOptionLabel(zoneCode, zoneNumber, rackValue) {
        if (zoneCode === 'AC' && zoneNumber === 2) {
            const zoneType = rackValue <= 15 ? '벌크존' : '원빠존';
            const productName = AC2_RACK_PRODUCTS[rackValue] || 'EMPTY';
            return `${rackValue} (${zoneType} | ${productName})`;
        }
        if (zoneCode === 'AD' && zoneNumber === 2) {
            const productName = AD2_RACK_PRODUCTS[rackValue] || 'EMPTY';
            return `${rackValue} (벌크존 | ${productName})`;
        }
        return String(rackValue);
    }

    function fillSelectOptions(selectElement, values, preferredValue = null, labelResolver = null) {
        const currentValue = Number(selectElement.value);
        const targetValue = preferredValue ?? currentValue;
        selectElement.innerHTML = '';

        values.forEach((value) => {
            const option = document.createElement('option');
            option.value = String(value);
            option.textContent = labelResolver ? labelResolver(value) : String(value);
            selectElement.appendChild(option);
        });

        if (!values.length) return;
        if (values.includes(targetValue)) {
            selectElement.value = String(targetValue);
        } else {
            selectElement.value = String(values[0]);
        }
    }

    function getLocationRule(zoneCode, zoneNumber) {
        const zoneRuleKey = `${zoneCode}-${Number(zoneNumber)}`;
        return locationInputRules[zoneRuleKey] || null;
    }

    function updateRackCellOptions(preferredRack = null, preferredCell = null) {
        const zoneGroup = document.getElementById('zoneGroup').value;
        const zoneCode = document.getElementById('zoneCode').value;
        const zoneNumber = Number(document.getElementById('zoneNumber').value);
        const rackInput = document.getElementById('rackInput');
        const cellInput = document.getElementById('cellInput');
        const locationRule = getLocationRule(zoneCode, zoneNumber);

        const rackRange = locationRule?.rackRange || DEFAULT_RACK_RANGE;
        const cellOptions = locationRule?.cellOptions || DEFAULT_CELL_OPTIONS;
        fillSelectOptions(
            rackInput,
            createRange(rackRange[0], rackRange[1]),
            preferredRack,
            (value) => getRackOptionLabel(zoneCode, zoneNumber, value)
        );
        fillSelectOptions(cellInput, cellOptions, preferredCell);

        const tempLot = zoneGroup === 'TEMP_LOT';
        const hZone = zoneGroup === 'H_ZONE';
        const lockCell = Boolean(locationRule?.lockCell);

        rackInput.disabled = tempLot;
        cellInput.disabled = tempLot || hZone || lockCell;

        if (hZone || lockCell) {
            cellInput.value = '1';
        }
        if (tempLot) {
            rackInput.value = '23';
            cellInput.value = '3';
        }
    }

    function updateZoneCodeOptions() {
        const zoneGroup = document.getElementById('zoneGroup').value;
        const zoneCodeSelect = document.getElementById('zoneCode');
        const codes = zoneGroups[zoneGroup].codes;

        zoneCodeSelect.innerHTML = '';
        codes.forEach((code) => {
            const option = document.createElement('option');
            option.value = code;
            option.textContent = code === 'TEMP_LOT' ? '임시지번' : code;
            zoneCodeSelect.appendChild(option);
        });

        zoneCodeSelect.value = codes[0];
        zoneCodeSelect.disabled = zoneGroup === 'TEMP_LOT';
        updateZoneNumberOptions();
    }

    function updateZoneNumberOptions(preferredNumber = null) {
        const zoneCode = document.getElementById('zoneCode').value;
        const zoneNumberSelect = document.getElementById('zoneNumber');
        const [start, end] = zoneRules[zoneCode];

        const currentValue = Number(zoneNumberSelect.value);
        const targetValue = preferredNumber ?? currentValue;

        zoneNumberSelect.innerHTML = '';
        for (let value = start; value <= end; value += 1) {
            const option = document.createElement('option');
            option.value = String(value);
            option.textContent = getNumberOptionLabel(zoneCode, value);
            zoneNumberSelect.appendChild(option);
        }

        zoneNumberSelect.disabled = zoneCode === 'TEMP_LOT' || (start === end);

        if (targetValue >= start && targetValue <= end) {
            zoneNumberSelect.value = String(targetValue);
        } else {
            zoneNumberSelect.value = String(start);
        }
    }

    function applyDefaultsByGroup(force = false) {
        const zoneGroup = document.getElementById('zoneGroup').value;
        const defaults = groupDefaults[zoneGroup];
        const zoneCodeSelect = document.getElementById('zoneCode');
        const rackInput = document.getElementById('rackInput');
        const cellInput = document.getElementById('cellInput');

        if (!defaults) return;

        if (force || !zoneCodeSelect.value) {
            zoneCodeSelect.value = defaults.code;
        }
        zoneCodeSelect.value = defaults.code;
        updateZoneNumberOptions(defaults.number);

        updateRackCellOptions(defaults.rack, defaults.cell);
    }

    function applyInputStateOnly() {
        updateRackCellOptions();
    }

    function resolveZoneValue(zoneCode, zoneNumber) {
        if (zoneCode === 'TEMP_LOT') {
            return { resolvedCode: 'B', resolvedNumber: 1 };
        }
        return { resolvedCode: zoneCode, resolvedNumber: Number(zoneNumber) };
    }

    function formatZonePart(zoneCode, zoneNumber) {
        return `0${zoneCode}${String(zoneNumber).padStart(2, '0')}`;
    }

    function formatNumberPart(rawValue, length) {
        const trimmed = String(rawValue).trim();
        if (!/^\d+$/.test(trimmed)) return null;
        return trimmed.padStart(length, '0');
    }

    function getCurrentPayload() {
        applyInputStateOnly();

        const part1 = '1F';
        const zoneCode = document.getElementById('zoneCode').value;
        const zoneNumber = document.getElementById('zoneNumber').value;
        const { resolvedCode, resolvedNumber } = resolveZoneValue(zoneCode, zoneNumber);
        const part2 = formatZonePart(resolvedCode, resolvedNumber);
        const part3 = formatNumberPart(document.getElementById('rackInput').value, 3);
        const part4 = formatNumberPart(document.getElementById('cellInput').value, 3);

        if (!part3 || !part4) {
            alert('입력 형식이 올바르지 않습니다. (예: 존 D/10, 렉 3, 칸 103)');
            return null;
        }

        return {
            convertedString: `${part1}${part2}${part3}${part4}`,
            zoneGroup: document.getElementById('zoneGroup').value,
            zoneCode: resolvedCode,
            zoneNumber: resolvedNumber,
            rack: Number(document.getElementById('rackInput').value),
            cell: Number(document.getElementById('cellInput').value)
        };
    }

    function renderQRCode(text) {
        const resultTextDiv = document.getElementById('result-text');
        const qrcodeDiv = document.getElementById('qrcode');

        resultTextDiv.innerText = '변환 결과: ' + text;
        qrcodeDiv.innerHTML = '';
        new QRCode(qrcodeDiv, {
            text,
            width: 180,
            height: 180,
            colorDark : '#000000',
            colorLight : '#ffffff',
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function formatHistoryDisplay(item) {
        return `${item.zoneCode}${item.zoneNumber}-${item.rack}-${item.cell}`;
    }

    function formatHistoryTime(timestamp) {
        const d = new Date(timestamp);
        return `[ ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())} (${WEEKDAYS[d.getDay()]}) ]`;
    }

    function loadHistory() {
        try {
            const raw = localStorage.getItem(HISTORY_KEY);
            const parsed = raw ? JSON.parse(raw) : [];
            return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
            return [];
        }
    }

    function saveHistory(items) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
    }

    function addHistoryItem(payload) {
        if (payload.zoneGroup === 'TEMP_LOT') {
            return;
        }

        const history = loadHistory();
        const key = `${payload.zoneCode}|${payload.zoneNumber}|${payload.rack}|${payload.cell}`;
        const nextHistory = [
            { ...payload, key, timestamp: Date.now() },
            ...history.filter((item) => item.key !== key)
        ].slice(0, HISTORY_LIMIT);

        saveHistory(nextHistory);
        renderHistory();
    }


    function removeHistoryItem(key) {
        const history = loadHistory().filter((item) => item.key !== key);
        saveHistory(history);
        renderHistory();
    }

    function clearHistory() {
        saveHistory([]);
        renderHistory();
    }

    function applyHistoryToInputs(item) {
        const groupEntry = Object.entries(zoneGroups).find(([, group]) => group.codes.includes(item.zoneCode));
        if (!groupEntry) return;

        const [groupKey] = groupEntry;
        const zoneGroupSelect = document.getElementById('zoneGroup');
        const zoneCodeSelect = document.getElementById('zoneCode');
        const zoneNumberSelect = document.getElementById('zoneNumber');

        zoneGroupSelect.value = groupKey;
        updateZoneCodeOptions();
        zoneCodeSelect.value = item.zoneCode;
        updateZoneNumberOptions(item.zoneNumber);
        zoneNumberSelect.value = String(item.zoneNumber);

        document.getElementById('rackInput').value = String(item.rack);
        document.getElementById('cellInput').value = String(item.cell);
        updateRackCellOptions(item.rack, item.cell);
    }

    function handleHistorySelect(item) {
        applyHistoryToInputs(item);
        renderQRCode(item.convertedString);
    }

    function renderHistory() {
        const historyList = document.getElementById('history-list');
        const history = loadHistory();

        historyList.innerHTML = '';
        history.forEach((item) => {
            const li = document.createElement('li');
            const row = document.createElement('div');
            row.className = 'history-row';

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'history-item-btn';
            button.textContent = `${formatHistoryTime(item.timestamp)} ${formatHistoryDisplay(item)}`;
            button.addEventListener('click', () => handleHistorySelect(item));

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'emoji-btn';
            deleteBtn.title = '삭제';
            deleteBtn.textContent = '❌';
            deleteBtn.addEventListener('click', (event) => {
                event.stopPropagation();
                removeHistoryItem(item.key);
            });

            row.appendChild(button);
            row.appendChild(deleteBtn);
            li.appendChild(row);
            historyList.appendChild(li);
        });
    }

    function previewQR() {
        const payload = getCurrentPayload();
        if (!payload) return;
        renderQRCode(payload.convertedString);
    }

    function convertAndSave() {
        const payload = getCurrentPayload();
        if (!payload) return;
        renderQRCode(payload.convertedString);
        addHistoryItem(payload);
    }

    window.onload = () => {
        initializeZoneInputs();
        document.getElementById('zoneGroup').addEventListener('change', () => {
            updateZoneCodeOptions();
            applyDefaultsByGroup(true);
            previewQR();
        });
        document.getElementById('zoneCode').addEventListener('change', () => {
            updateZoneNumberOptions();
            updateRackCellOptions();
            previewQR();
        });
        document.getElementById('zoneNumber').addEventListener('change', () => {
            updateRackCellOptions();
            previewQR();
        });
        document.getElementById('rackInput').addEventListener('change', previewQR);
        document.getElementById('cellInput').addEventListener('change', previewQR);
        document.getElementById('saveBtn').addEventListener('click', convertAndSave);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);

        renderHistory();
        previewQR();
    };
</script>

</body>
</html>
